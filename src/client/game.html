<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0, width=device-width, height=device-height, user-scalable=0"
    />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <title>Loose Cables — The Cable Tower</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Nunito:wght@600;700;800;900&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" type="text/css" href="game.css" />
  </head>
  <body>
    <div id="app">
      <!-- ============ LOADING ============ -->
      <div id="screen-loading" class="screen">
        <div class="loader-cable"></div>
        <p>Untangling&hellip;</p>
      </div>

      <!-- ============ CABLE TOWER MAP ============ -->
      <div id="screen-map" class="screen" hidden>
        <header class="map-header">
          <h1 class="map-title">Loose <span>Cables</span></h1>
          <div style="display: flex; align-items: center; gap: 8px">
            <div class="wallet" id="wallet-stars" title="Total stars">&#9733; <span id="total-stars">0</span></div>
            <div class="wallet" id="wallet-ties" title="Zip Ties">&#128279; <span id="total-ties">0</span></div>
            <button id="mute-btn" class="icon-btn" type="button" aria-label="Toggle sound">&#9835;</button>
          </div>
        </header>

        <div class="daily-strip" id="daily-strip">
          <div class="daily-info">
            <h3>Today&apos;s Tangle</h3>
            <p id="daily-meta">One board. One shot. Whole subreddit.</p>
          </div>
          <button id="daily-btn" class="btn small" type="button">Play</button>
        </div>

        <div class="tower-scroll" id="tower-scroll">
          <div class="tower" id="tower"></div>
        </div>
      </div>

      <!-- ============ PLAY ============ -->
      <div id="screen-play" class="screen" hidden>
        <canvas id="game-canvas"></canvas>

        <div class="hud">
          <button id="back-btn" class="icon-btn" type="button" aria-label="Back to map">&#8592;</button>
          <div class="hud-pill">
            <span class="label">Moves</span>
            <span class="value" id="hud-moves">0</span>
            <span class="label">Par</span>
            <span class="value" id="hud-par">0</span>
          </div>
          <div class="hud-pill hud-stars" id="hud-stars" aria-label="Projected stars">
            &#9733;&#9733;&#9733;
          </div>
          <button id="restart-btn" class="icon-btn" type="button" aria-label="Restart level">&#8635;</button>
        </div>

        <div class="level-toast" id="level-toast" hidden>
          <h2 id="toast-name"></h2>
          <p id="toast-sub"></p>
        </div>

        <!-- Win panel -->
        <div class="overlay" id="win-overlay" hidden>
          <div class="result-card">
            <h2 id="win-title">Level Clear!</h2>
            <p class="subtitle" id="win-flavor"></p>
            <div class="result-stars" id="win-stars">
              <span class="star">&#9733;</span>
              <span class="star">&#9733;</span>
              <span class="star">&#9733;</span>
            </div>
            <div class="result-stats">
              <div class="stat"><span class="num" id="win-moves">0</span><span class="cap">Moves</span></div>
              <div class="stat"><span class="num" id="win-par">0</span><span class="cap">Par</span></div>
            </div>
            <div class="tie-earn" id="win-ties" hidden>&#128279; +<span id="win-ties-n">0</span> Zip Ties</div>
            <div class="result-actions">
              <button id="win-retry-btn" class="btn ghost" type="button">Improve</button>
              <button id="win-next-btn" class="btn" type="button">Next</button>
            </div>
          </div>
        </div>
      </div>
    </div>

    <script type="module" src="game.ts" defer></script>
  </body>
</html>
