<!doctype html>
<html lang="en">
  <head>
    <link rel="stylesheet" type="text/css" href="game.css" />
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0, width=device-width, height=device-height, user-scalable=0"
    />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="full-screen" content="yes" />
    <meta name="x5-fullscreen" content="true" />
    <meta name="360-fullscreen" content="true" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  </head>
  <body>
    <canvas id="bg"></canvas>

    <div id="hud">Untangle the cables — drag a plug to a free socket</div>

    <button id="newBtn" type="button">New</button>

    <div id="menu">
      <h1>LOOSE CABLES</h1>
      <p>Drag plugs to free sockets. Unwrap the pile until every cable runs clean.</p>
      <div id="difficulties">
        <button type="button" data-diff="easy">Easy</button>
        <button type="button" data-diff="medium">Medium</button>
        <button type="button" data-diff="hard">Hard</button>
        <button type="button" data-diff="extreme">Extreme</button>
        <button type="button" data-diff="nightmare">Nightmare</button>
      </div>
    </div>

    <div id="win" class="hidden">
      <div id="winTitle">ALL CLEAR</div>
      <div id="winStats"></div>
      <button id="nextBtn" type="button">Next puzzle</button>
    </div>

    <script type="module" src="game.ts" defer></script>
  </body>
</html>
